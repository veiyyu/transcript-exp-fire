<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mic to Spectacles</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #0f0f0f;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    h1 { font-size: 1.4rem; margin-bottom: 24px; opacity: 0.7; }
    #status {
      font-size: 1rem;
      margin-bottom: 16px;
      color: #888;
    }
    #micBtn {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: none;
      background: #e53935;
      color: white;
      font-size: 2rem;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s;
    }
    #micBtn.listening { background: #43a047; transform: scale(1.1); }
    #transcript {
      margin-top: 32px;
      max-width: 500px;
      width: 100%;
      background: #1e1e1e;
      border-radius: 12px;
      padding: 16px;
      font-size: 1rem;
      line-height: 1.6;
      min-height: 80px;
      color: #ddd;
    }
  </style>
</head>
<body>
  <h1>🎙️ Mic → Spectacles</h1>
  <div id="status">Tap to start</div>
  <button id="micBtn">🎤</button>
  <div id="transcript">Your speech will appear here...</div>
  <script>
    const SUPABASE_URL = 'https://akfpmfnnmhoatqslpvqt.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFrZnBtZm5ubWhvYXRxc2xwdnF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMjQyMjQsImV4cCI6MjA4OTcwMDIyNH0.mS4BgmmGY0YQzN7WNqaEw4PofElpcvDzpi8uqleFxTM';

    const btn = document.getElementById('micBtn');
    const statusEl = document.getElementById('status');
    const transcriptEl = document.getElementById('transcript');

    let recognition;
    let listening = false;
    let fullText = '';

    let saveTimeout = null;

    async function saveToSupabase(text) {
      if (saveTimeout) clearTimeout(saveTimeout);
      saveTimeout = setTimeout(async () => {
        await fetch(`${SUPABASE_URL}/rest/v1/transcript?id=eq.1`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          },
          body: JSON.stringify({ text })
        });
      }, 150);
    }

    function startRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        statusEl.textContent = '❌ Speech not supported on this browser';
        return;
      }
      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'en-US';

      recognition.onresult = (event) => {
        let interim = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const t = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            fullText += t + ' ';
          } else {
            interim = t;
          }
        }
        const displayText = fullText + interim;
        transcriptEl.textContent = displayText;
        saveToSupabase(displayText.trim());
      };

      recognition.onerror = (e) => {
        statusEl.textContent = '❌ Error: ' + e.error;
      };

      recognition.onend = () => {
        if (listening) recognition.start();
      };

      recognition.start();
    }

    btn.addEventListener('click', () => {
      if (!listening) {
        listening = true;
        btn.classList.add('listening');
        btn.textContent = '⏹';
        statusEl.textContent = '🟢 Listening...';
        startRecognition();
      } else {
        listening = false;
        btn.classList.remove('listening');
        btn.textContent = '🎤';
        statusEl.textContent = 'Tap to start';
        if (recognition) recognition.stop();
        fullText = '';
      }
    });
  </script>
</body>
</html>
