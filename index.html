<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mic to Spectacles</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #0f0f0f;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    h1 { font-size: 1.4rem; margin-bottom: 24px; opacity: 0.7; }
    #status { font-size: 1rem; margin-bottom: 16px; color: #888; }
    #micBtn {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: none;
      background: #e53935;
      color: white;
      font-size: 2rem;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s;
    }
    #micBtn.listening { background: #43a047; transform: scale(1.1); }
    #transcript {
      margin-top: 32px;
      max-width: 500px;
      width: 100%;
      background: #1e1e1e;
      border-radius: 12px;
      padding: 16px;
      font-size: 1rem;
      line-height: 1.6;
      min-height: 80px;
      color: #ddd;
    }
  </style>
</head>
<body>
  <h1>🎙️ Mic → Spectacles</h1>
  <div id="status">Tap to start</div>
  <button id="micBtn">🎤</button>
  <div id="transcript">Your speech will appear here...</div>
  <script>
    const FIREBASE_URL = 'https://transcript-exp-default-rtdb.firebaseio.com/transcript.json';

    const btn = document.getElementById('micBtn');
    const statusEl = document.getElementById('status');
    const transcriptEl = document.getElementById('transcript');

    let recognition;
    let listening = false;
    let finalText = '';
    let isSaving = false;
    let pendingSave = null;

    async function saveToFirebase(payload) {
      if (isSaving) {
        pendingSave = payload;
        return;
      }
      isSaving = true;
      try {
        await fetch(FIREBASE_URL, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
      } finally {
        isSaving = false;
        if (pendingSave !== null) {
          const next = pendingSave;
          pendingSave = null;
          saveToFirebase(next);
        }
      }
    }

    function startRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        statusEl.textContent = '❌ Speech not supported on this browser';
        return;
      }
      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'en-US';

      recognition.onresult = (event) => {
        let interim = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const t = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            finalText += t + ' ';
          } else {
            interim = t;
          }
        }

        const displayText = finalText + interim;
        transcriptEl.textContent = displayText;

        // Send both final and interim separately so Spectacles knows the difference
        saveToFirebase({
          final: finalText.trim(),
          interim: interim.trim(),
          timestamp: Date.now()
        });
      };

      recognition.onerror = (e) => {
        statusEl.textContent = '❌ Error: ' + e.error;
      };

      recognition.onend = () => {
        if (listening) recognition.start();
      };

      recognition.start();
    }

    btn.addEventListener('click', () => {
      if (!listening) {
        listening = true;
        btn.classList.add('listening');
        btn.textContent = '⏹';
        statusEl.textContent = '🟢 Listening...';
        startRecognition();
      } else {
        listening = false;
        btn.classList.remove('listening');
        btn.textContent = '🎤';
        statusEl.textContent = 'Tap to start';
        if (recognition) recognition.stop();
        finalText = '';
        saveToFirebase({ final: '', interim: '', timestamp: Date.now() });
      }
    });
  </script>
</body>
</html>
